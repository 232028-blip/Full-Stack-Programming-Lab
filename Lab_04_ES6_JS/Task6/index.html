<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>API Data Fetcher</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <div class="page-header">
    <div class="header-top">
      <div>
        <h1>Posts Feed</h1>
        <p>Data fetched from <span class="mono">jsonplaceholder.typicode.com</span></p>
      </div>
      <div class="controls">
        <div class="toggle-group">
          <button class="toggle-btn active" data-type="posts">Posts</button>
          <button class="toggle-btn" data-type="users">Users</button>
        </div>
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="Search…" />
        </div>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">Loaded</span>
        <span class="stat-value" id="statLoaded">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Showing</span>
        <span class="stat-value" id="statShowing">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Source</span>
        <span class="stat-value" id="statSource">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Status</span>
        <span class="stat-value" id="statStatus">Idle</span>
      </div>
    </div>
  </div>

  <!-- ── List container ── -->
  <main class="list-wrap">
    <div id="itemList" class="item-list"></div>

    <!-- Skeleton loader -->
    <div id="skeletonList" class="item-list hidden">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <!-- Empty / Error state -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">∅</div>
      <p id="emptyMsg">No results found.</p>
    </div>
  </main>

  <!-- ── Footer actions ── -->
  <div class="footer-actions">
    <span id="footerInfo" class="footer-info"></span>
    <button id="loadMoreBtn" class="load-more-btn hidden">Load more</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
