<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chained Style Editor</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="container">
    <h2>🎨 Chained Style Editor</h2>

    <div class="text-box" id="editableText">
        This is a customizable text block. Use the buttons below to change my style!
    </div>

    <div class="button-group">
        <button id="increaseFont">A+</button>
        <button id="decreaseFont">A-</button>
        <button id="changeColor">Text Color</button>
        <button id="changeBg">Background</button>
        <button id="toggleBold">Bold</button>
        <button id="toggleItalic">Italic</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
